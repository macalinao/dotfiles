name: "Check & Cachix"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        runsOn:
          - ubuntu-22.04
          - macos-15-intel # check things work on Intel
          - macos-26
    runs-on: ${{ matrix.runsOn }}
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: igm
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: nix flake check --print-build-logs --show-trace

  linux:
    strategy:
      fail-fast: false
      matrix:
        nixosConfiguration:
          - ci-home
          - ci-bare
          - ci-headless
          - vbox-host
    runs-on: ubuntu-latest
    steps:
      - run: sudo apt-get clean
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: igm
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: nix -Lv build ".#nixosConfigurations.${{ matrix.nixosConfiguration }}.config.system.build.toplevel"

  macos-26:
    strategy:
      fail-fast: false
      matrix:
        runsOn:
          - macos-26
    runs-on: ${{ matrix.runsOn }}
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: igm
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: nix -Lv build ".#darwinConfigurations.ci-personal-m1.system"
